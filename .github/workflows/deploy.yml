name: Deploy to graminpanseva VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/graminpanseva
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            systemctl restart graminpanseva
