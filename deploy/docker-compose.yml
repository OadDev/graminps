services:
  mongo:
    image: mongo:7
    container_name: gramin_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - gramin_net

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gramin_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # These override anything in .env so the container always talks to the mongo service
      MONGO_URL: "mongodb://mongo:27017"
      FRONTEND_DIR: "/app/frontend/public"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - gramin_net

  nginx:
    image: nginx:alpine
    container_name: gramin_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - gramin_net

  certbot:
    image: certbot/certbot
    container_name: gramin_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Auto-renew loop
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
  uploads_data:

networks:
  gramin_net:
    driver: bridge
