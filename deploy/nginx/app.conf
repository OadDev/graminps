upstream gramin_backend {
    server backend:8001;
}

# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name graminpanseva.in www.graminpanseva.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: serve the app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name graminpanseva.in www.graminpanseva.in;

    ssl_certificate     /etc/letsencrypt/live/graminpanseva.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graminpanseva.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://gramin_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
